<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Love - 夜空下的心语</title>
    <style>
        /* 1. 动态浪漫夜空背景 */
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Microsoft YaHei', sans-serif; background: radial-gradient(circle at center, #2c3e50 0%, #1a1a1a 100%); overflow: hidden; position: relative; }
        /* 背景微光粒子层 */
        .stars { position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxkZWZzPjxyYWRpYWxHcmFkaWVudCBpZD0ic3RhciIgY3g9IjUwJSIgY3k9IjUwJSIgcj0iNTAlIiBmeD0iNTAlIiBmeT0iNTAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjZmZmZmZmIiBzdG9wLW9wYWNpdHk9IjEiLz48c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiNmZmZmZmYiIHN0b3Atb3BhY2l0eT0iMCIvPjwvcmFkaWFsR3JhZGllbnQ+PC9kZWZzPjxjaXJjbGUgY3g9IjI1JSIgY3k9IjI1JSIgcj0iMSIgZmlsbD0idXJsKCNzdGFyKSIvPjxjaXJjbGUgY3g9Ijc1JSIgY3k9Ijc1JSIgcj0iMS41IiBmaWxsPSJ1cmwoI3N0YXIpIi8+PC9zdmc+') ; opacity: 0.3; animation: starsFloat 50s linear infinite; }
        @keyframes starsFloat { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* 2. 精致信纸卡片 */
        .love-card { background: rgba(255, 255, 255, 0.95); padding: 50px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); max-width: 500px; text-align: center; line-height: 2.2; position: relative; z-index: 10; transform: translateY(20px); opacity: 0; animation: cardEntry 1.5s ease-out forwards; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        @keyframes cardEntry { to { transform: translateY(0); opacity: 1; } }

        h1 { color: #c0392b; font-size: 2.2em; margin-bottom: 25px; font-weight: normal; border-bottom: 2px dashed #e6c1c1; padding-bottom: 15px; }
        p { color: #444; font-size: 1.25em; text-align: left; text-indent: 2em; margin-bottom: 20px; min-height: 1.2em; } /* 占位以避免打字时高度抖动 */

        /* 打字机效果的光标 */
        .typed-cursor { opacity: 1; animation: blink 0.7s infinite; color: #c0392b; font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .signature { text-align: right; margin-top: 50px; font-weight: bold; color: #c0392b; font-size: 1.3em; opacity: 0; animation: signatureEntry 1s ease-out 5s forwards; } /* 延迟显示 */
        @keyframes signatureEntry { to { opacity: 1; } }

        /* 返回按钮样式 */
        .back-btn { display: inline-block; margin-top: 40px; font-size: 0.9em; color: #888; text-decoration: none; border: 1px solid #ccc; padding: 8px 20px; border-radius: 20px; transition: all 0.3s; opacity: 0.6; }
        .back-btn:hover { color: #fff; background-color: #c0392b; border-color: #c0392b; opacity: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* 3. 动态流星爱心生成区域 */
        #heart-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5; }
        .falling-heart { position: absolute; background: #e74c3c; width: 15px; height: 15px; transform: rotate(-45deg); opacity: 0; animation: heartFall linear forwards; box-shadow: 0 0 10px #ff6b6b; }
        .falling-heart::before, .falling-heart::after { content: ''; position: absolute; width: 15px; height: 15px; background: inherit; border-radius: 50%; }
        .falling-heart::before { top: -7.5px; left: 0; }
        .falling-heart::after { top: 0; left: 7.5px; }

        @keyframes heartFall { 0% { transform: translate(var(--start-x), var(--start-y)) rotate(-45deg) scale(0); opacity: 0; } 10% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) rotate(-45deg) scale(var(--scale)); } 100% { transform: translate(var(--end-x), var(--end-y)) rotate(-45deg) scale(var(--scale)); opacity: 0; } }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div id="heart-container"></div>

    <div class="love-card">
        <h1>亲爱的 <span id="partner-name"></span>：</h1>
        
        <p id="typed-p1"></p>
        <p id="typed-p2"></p>
        
        <div class="signature">爱你的，<span id="your-name"></span></div>
        
        <a href="index.html" class="back-btn">返回项目页</a>
    </div>

    <script>
        // --- 1. 定制你的名字（在这里修改） ---
        const partnerNameStr = "冒颖婷"; // 替换为她/他的名字
        const yourNameStr = "刘奥运";       // 替换为你的名字
        
        // --- 2. 打字机效果设置 ---
        const textP1 = "如果说代码的运行需要严谨的逻辑，那么我生活里最美妙的变量就是你。在日复一日的实验、数据和报错中，你是我最安心的避风港。";
        const textP2 = "我想把这个只属于我们的小小网页藏在我的项目里，就像把你永远藏在我心里最重要的位置。无论未来我们在哪里，我的世界永远对你设定为 100% 响应。";

        function typeWriter(elementId, text, speed, delay, callback) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = ''; // 清空原内容
            
            // 创建光标元素
            const cursor = document.createElement('span');
            cursor.className = 'typed-cursor';
            cursor.innerHTML = '|';
            
            setTimeout(() => {
                element.appendChild(cursor); // 添加光标
                const timer = setInterval(() => {
                    if (i < text.length) {
                        element.insertBefore(document.createTextNode(text.charAt(i)), cursor);
                        i++;
                    } else {
                        clearInterval(timer);
                        cursor.remove(); // 打字结束移除光标
                        if (callback) callback();
                    }
                }, speed);
            }, delay);
        }

        // --- 3. 动态流星心生成设置 ---
        const heartContainer = document.getElementById('heart-container');
        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.className = 'falling-heart';
            
            // 随机设置大小 (scale 0.5 到 1.5)
            const scale = 0.5 + Math.random();
            heart.style.setProperty('--scale', scale);
            
            // 随机设置起始位置 (屏幕上方偏左到偏右)
            const startX = Math.random() * window.innerWidth + 'px';
            const startY = -50 + 'px'; // 从屏幕上方 50px 开始
            heart.style.setProperty('--start-x', startX);
            heart.style.setProperty('--start-y', startY);

            // 随机设置结束位置 (屏幕下方，有一定横向偏移)
            const endX = (parseFloat(startX) + (Math.random() - 0.5) * 500) + 'px'; // 偏移 -250px 到 250px
            const endY = window.innerHeight + 100 + 'px'; // 飞出屏幕下方 100px
            heart.style.setProperty('--end-x', endX);
            heart.style.setProperty('--end-y', endY);

            // 随机设置动画持续时间 (4秒到8秒)
            const duration = 4 + Math.random() * 4 + 's';
            heart.style.animationDuration = duration;

            // 随机设置初始淡入延迟
            heart.style.animationDelay = Math.random() * 2 + 's';

            heartContainer.appendChild(heart);
            
            // 动画结束后移除元素，避免内存溢出
            setTimeout(() => { heart.remove(); }, (parseFloat(duration) + 2) * 1000);
        }

        // --- 4. 初始化和执行 ---
        window.onload = function() {
            // 设置名字
            document.getElementById('partner-name').innerText = partnerNameStr;
            document.getElementById('your-name').innerText = yourNameStr;
            
            // 开启背景流星心生成
            createFallingHeart(); // 先生成一颗
            setInterval(createFallingHeart, 1500); // 每 1.5 秒生成一颗新心

            // 顺序执行打字机效果
            typeWriter('typed-p1', textP1, 80, 1500, () => { // 速度80ms/字，延迟1.5秒开始
                typeWriter('typed-p2', textP2, 70, 500); // 速度70ms/字，延迟0.5秒开始
            });
        };
    </script>

</body>
</html>
